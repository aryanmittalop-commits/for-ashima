<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>A Letter for Ashima 💜</title>

    <link
        rel="stylesheet"
        href="../assets/css/style.css"
    >
</head>

<body>

    <audio id="bgMusic" loop>
        <source
            src="../assets/music/background.m4a"
            type="audio/mp4"
        >
    </audio>

    <section class="letter-page">

        <div class="envelope-wrap" id="envelopeWrap">

            <div class="envelope">

                <img
                    id="envelopeImage"
                    src="../assets/images/envelope.webp"
                    alt="Envelope"
                >

                <div class="letter-paper">

                    <h2>For Ashima 💜</h2>

                    <p id="letterText"></p>

                    <button id="letterContinueBtn">
                        Continue ✨
                    </button>

                </div>

            </div>

            <button id="openLetterBtn">
                Tap to Open 💌
            </button>

        </div>

    </section>

    <script src="../assets/js/script.js"></script>

</body>

</html>
